<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Muscu Tracker</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <nav>
    <span class="logo">Muscu</span>
    <a href="index.html" class="active">Séances</a>
    <a href="calendar.html">Calendrier</a>
    <a href="progress.html">Progression</a>
  </nav>

  <main>
    <div class="header-row">
      <h1>Séances</h1>
      <button id="btn-new-session" class="btn-primary">+ Nouvelle séance</button>
    </div>

    <!-- New session form -->
    <div id="form-new-session" class="card hidden">
      <h2>Nouvelle séance</h2>
      <div class="form-row">
        <label>Date</label>
        <input type="date" id="input-date">
      </div>
      <div class="form-row">
        <label>Notes</label>
        <input type="text" id="input-notes" placeholder="Ex: Dos/Biceps">
      </div>
      <div class="form-row">
        <label>Tags</label>
        <div class="tags-input-wrap">
          <div id="tags-selected"></div>
          <input type="text" id="input-tag" placeholder="jambes, pecs… + Entrée">
        </div>
      </div>
      <div class="form-actions">
        <button id="btn-create-session" class="btn-primary">Créer</button>
        <button id="btn-cancel-session" class="btn-ghost">Annuler</button>
      </div>
    </div>

    <!-- Tag filters -->
    <div id="tag-filters" class="tag-filters"></div>

    <!-- Sessions list -->
    <div id="sessions-list">
      <div class="skeleton-item"><div style="flex:1;display:flex;flex-direction:column;gap:10px"><div class="skeleton-line" style="width:45%"></div><div class="skeleton-line" style="width:30%"></div></div><div class="skeleton-line" style="width:24px;height:24px;border-radius:6px"></div></div>
      <div class="skeleton-item"><div style="flex:1;display:flex;flex-direction:column;gap:10px"><div class="skeleton-line" style="width:38%"></div><div class="skeleton-line" style="width:55%"></div></div><div class="skeleton-line" style="width:24px;height:24px;border-radius:6px"></div></div>
      <div class="skeleton-item"><div style="flex:1;display:flex;flex-direction:column;gap:10px"><div class="skeleton-line" style="width:50%"></div><div class="skeleton-line" style="width:22%"></div></div><div class="skeleton-line" style="width:24px;height:24px;border-radius:6px"></div></div>
      <div class="skeleton-item"><div style="flex:1;display:flex;flex-direction:column;gap:10px"><div class="skeleton-line" style="width:42%"></div><div class="skeleton-line" style="width:40%"></div></div><div class="skeleton-line" style="width:24px;height:24px;border-radius:6px"></div></div>
    </div>

    <!-- Session detail modal -->
    <div id="modal-session" class="modal hidden">
      <div class="modal-box">
        <div class="modal-header">
          <h2 id="modal-title">Séance</h2>
          <div style="display:flex;gap:8px;align-items:center">
            <div id="modal-session-actions" style="display:flex;gap:8px">
              <button class="btn-icon btn-icon-green" onclick="toggleAddExercise()" title="Ajouter un exercice">
                <svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round">
                  <line x1="8" y1="2" x2="8" y2="14"/><line x1="2" y1="8" x2="14" y2="8"/>
                </svg>
              </button>
              <button class="btn-icon btn-icon-red" onclick="deleteCurrentSession()" title="Supprimer la séance">
                <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                  <polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14H6L5 6"/><path d="M10 11v6"/><path d="M14 11v6"/><path d="M9 6V4h6v2"/>
                </svg>
              </button>
            </div>
            <button id="modal-close" class="btn-ghost">✕</button>
          </div>
        </div>
        <div id="logs-list"></div>
        <div id="delete-confirm-panel" class="hidden" style="margin:12px 0;padding:14px;background:rgba(248,113,113,0.08);border:1px solid rgba(248,113,113,0.3);border-radius:var(--radius)">
          <p id="delete-confirm-text" style="font-size:0.88rem;margin-bottom:12px;color:var(--text)"></p>
          <div style="display:flex;gap:8px">
            <button onclick="confirmDeleteSession()" class="btn-primary" style="background:var(--danger)">Supprimer</button>
            <button onclick="cancelDeleteSession()" class="btn-ghost">Annuler</button>
          </div>
        </div>
        <div id="add-exercise-panel" class="add-exercise hidden">
          <h3>Ajouter un exercice</h3>
          <div class="form-row">
            <input type="text" id="input-exercise" placeholder="Nom de l'exercice" list="exercise-suggestions-add">
            <datalist id="exercise-suggestions-add"></datalist>
          </div>
          <div id="sets-builder"></div>
          <div class="form-actions">
            <button id="btn-add-set" class="btn-ghost">+ Set</button>
            <button id="btn-save-exercise" class="btn-primary">Enregistrer</button>
          </div>
        </div>
      </div>
    </div>

    <!-- Edit exercise modal -->
    <div id="modal-edit-exercise" class="modal hidden">
      <div class="modal-box" style="max-width:420px">
        <div class="modal-header">
          <h2>Modifier l'exercice</h2>
          <button id="edit-exercise-close" class="btn-ghost">✕</button>
        </div>
        <div class="form-row">
          <label>Exercice</label>
          <input type="text" id="edit-exercise-name" list="exercise-suggestions">
          <datalist id="exercise-suggestions"></datalist>
        </div>
        <div id="edit-exercise-sets"></div>
        <div class="form-actions">
          <button id="edit-exercise-add-set" class="btn-ghost">+ Set</button>
          <button id="edit-exercise-save" class="btn-primary">Enregistrer</button>
        </div>
      </div>
    </div>

    <!-- Edit session modal -->
    <div id="modal-edit" class="modal hidden">
      <div class="modal-box" style="max-width:420px">
        <div class="modal-header">
          <h2>Modifier la séance</h2>
          <button id="edit-close" class="btn-ghost">✕</button>
        </div>
        <div class="form-row">
          <label>Date</label>
          <input type="date" id="edit-date">
        </div>
        <div class="form-row">
          <label>Notes</label>
          <input type="text" id="edit-notes" placeholder="Ex: Dos/Biceps">
        </div>
        <div class="form-row">
          <label>Tags</label>
          <div class="tags-input-wrap">
            <div id="edit-tags-selected"></div>
            <input type="text" id="edit-tag-input" placeholder="+ Entrée">
          </div>
        </div>
        <div class="form-actions">
          <button id="btn-save-edit" class="btn-primary">Enregistrer</button>
          <button id="edit-close-2" class="btn-ghost">Annuler</button>
        </div>
      </div>
    </div>
  </main>

  <script src="js/app.js"></script>
</body>
</html>
