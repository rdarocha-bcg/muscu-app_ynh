<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Progression — Muscu Tracker</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
</head>
<body>
  <nav aria-label="Navigation principale">
    <span class="logo">Muscu</span>
    <a href="index.html">Séances</a>
    <a href="calendar.html">Calendrier</a>
    <a href="progress.html" class="active" aria-current="page">Progression</a>
  </nav>

  <main>
    <nav aria-label="Fil d'Ariane" class="breadcrumb">
      <a href="index.html">Séances</a>
      <span aria-hidden="true">›</span>
      <span aria-current="page">Progression</span>
    </nav>

    <div class="header-row">
      <h1>Progression</h1>
    </div>

    <div class="card">
      <div class="form-row">
        <label for="select-exercise">Exercice</label>
        <select id="select-exercise">
          <option value="">— Choisir —</option>
        </select>
      </div>
      <div id="frequent-exercises"></div>
    </div>

    <div id="progress-content" class="hidden">
      <div class="stats-grid">
        <div class="stat-card">
          <div class="stat-label">Max poids</div>
          <div class="stat-value" id="stat-max-weight">—</div>
        </div>
        <div class="stat-card">
          <div class="stat-label">Max reps</div>
          <div class="stat-value" id="stat-max-reps">—</div>
        </div>
        <div class="stat-card">
          <div class="stat-label">Séances</div>
          <div class="stat-value" id="stat-sessions">—</div>
        </div>
        <div class="stat-card">
          <div class="stat-label">1RM estimé</div>
          <div class="stat-value" id="stat-1rm">—</div>
        </div>
      </div>

      <div class="card chart-card">
        <div class="chart-tabs" role="tablist" aria-label="Type de graphique">
          <button type="button" class="tab-btn active" data-tab="weight" role="tab" aria-selected="true" id="tab-weight">Poids max/séance</button>
          <button type="button" class="tab-btn" data-tab="volume" role="tab" aria-selected="false" id="tab-volume">Volume total</button>
          <button type="button" class="tab-btn" data-tab="reps" role="tab" aria-selected="false" id="tab-reps">Reps max</button>
        </div>
        <canvas id="progress-chart" aria-label="Graphique de progression"></canvas>
      </div>

      <div class="card">
        <h3>Historique</h3>
        <div id="history-table"></div>
      </div>
    </div>
  </main>

  <script src="js/common.js"></script>
  <script src="js/progress.js"></script>
</body>
</html>
