name: Debug Service Status

on: workflow_dispatch

permissions:
  contents: read

jobs:
  debug:
    name: Debug muscu-app on server
    runs-on: ubuntu-latest
    environment:
      name: production
    steps:
      - name: Setup SSH
        env:
          SSH_PRIVATE_KEY: ${{ secrets.YNH_SSH_PRIVATE_KEY }}
          SSH_KNOWN_HOSTS: ${{ secrets.YNH_SSH_KNOWN_HOSTS }}
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          printf '%s\n' "$SSH_PRIVATE_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          printf '%s\n' "$SSH_KNOWN_HOSTS" > ~/.ssh/known_hosts
          chmod 600 ~/.ssh/known_hosts

      - name: Check service status and logs
        env:
          SSH_HOST: ${{ secrets.YNH_SSH_HOST }}
          SSH_USER: ${{ secrets.YNH_SSH_USER }}
          SSH_PORT: ${{ vars.YNH_SSH_PORT || '22' }}
        run: |
          ssh -i ~/.ssh/id_ed25519 -p "$SSH_PORT" \
              -o StrictHostKeyChecking=yes \
              -o UserKnownHostsFile=~/.ssh/known_hosts \
              -o BatchMode=yes \
              -o IdentitiesOnly=yes \
              "$SSH_USER@$SSH_HOST" bash -s << 'SSHEOF'

          echo "=== Service Status ==="
          sudo systemctl status muscu-app --no-pager || true

          echo ""
          echo "=== Recent Logs (50 lines) ==="
          sudo journalctl -u muscu-app -n 50 --no-pager || true

          echo ""
          echo "=== Recent Errors ==="
          sudo journalctl -u muscu-app -p err -n 20 --no-pager || true

          echo ""
          echo "=== Port 8765 ==="
          sudo ss -tlpn 2>/dev/null | grep 8765 || echo "Port 8765 not listening"

          echo ""
          echo "=== Process Check (uvicorn/python) ==="
          ps aux | grep -E '[u]vicorn|[p]ython.*main' | grep -v grep || echo "No uvicorn process found"

          echo ""
          echo "=== Health Check ==="
          curl -sf http://127.0.0.1:8765/ 2>&1 | head -5 || echo "App not responding on localhost:8765"

          echo ""
          echo "=== Nginx Error Logs (last 20 lines) ==="
          sudo tail -n 20 /var/log/nginx/error.log 2>/dev/null || echo "No nginx error log"

          SSHEOF
